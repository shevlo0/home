<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RobloxBoard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/feed.css" />
  <link rel="stylesheet" href="css/modal.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="navbar-left">
      <div class="logo">
        <span class="logo-icon"></span>
        <span class="logo-text">RobloxBoard</span>
      </div>
      <div class="search-bar">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <input type="text" placeholder="게임, 게시물 검색..." id="searchInput" />
      </div>
    </div>
    <div class="navbar-right">
      <button class="nav-btn sort-btn" id="sortBtn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M4 8h8M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="sortLabel">최신순</span>
      </button>
      <button class="nav-btn lang-btn" id="langBtn">KO</button>
      <button class="nav-btn login-btn" id="loginBtn">로그인</button>
      <button class="nav-btn write-btn" id="writeBtn">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        글쓰기
      </button>
    </div>
  </header>

  <!-- ===== LAYOUT ===== -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <div class="sidebar-category">
          <div class="category-header pinned">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
              <path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a5.927 5.927 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707-.195-.195.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a5.922 5.922 0 0 1 1.013.16l3.134-3.133a2.772 2.772 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146z"/>
            </svg>
            공지
          </div>
          <ul class="section-list">
            <li class="section-item active" data-section="notice">
              <span class="section-icon">#</span> 공지사항
              <span class="section-pin">PIN</span>
            </li>
            <li class="section-item" data-section="update">
              <span class="section-icon">#</span> 업데이트
            </li>
          </ul>
        </div>

        <div class="sidebar-category">
          <div class="category-header">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
              <path d="M6 1H1v5l9.5 9.5a1 1 0 0 0 1.5 0l3-3a1 1 0 0 0 0-1.5L6 1zm-1.5 3a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
            </svg>
            게임 공유
          </div>
          <ul class="section-list">
            <li class="section-item" data-section="showcase"><span class="section-icon">#</span> 게임 소개</li>
            <li class="section-item" data-section="review"><span class="section-icon">#</span> 리뷰 / 평가</li>
            <li class="section-item" data-section="recommend"><span class="section-icon">#</span> 추천 요청</li>
          </ul>
        </div>

        <div class="sidebar-category">
          <div class="category-header">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
              <path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1h8zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002-.014.002H7.022zM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm-4 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
            </svg>
            커뮤니티
          </div>
          <ul class="section-list">
            <li class="section-item" data-section="general"><span class="section-icon">#</span> 자유 게시판</li>
            <li class="section-item" data-section="qna"><span class="section-icon">#</span> 질문 / 답변</li>
            <li class="section-item" data-section="tip"><span class="section-icon">#</span> 팁 &amp; 공략</li>
          </ul>
        </div>

        <div class="sidebar-category">
          <div class="category-header">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor">
              <path d="M10.478 1.647a.5.5 0 1 0-.956-.294l-4 13a.5.5 0 0 0 .956.294l4-13zM4.854 4.146a.5.5 0 0 1 0 .708L1.707 8l3.147 3.146a.5.5 0 0 1-.708.708l-3.5-3.5a.5.5 0 0 1 0-.708l3.5-3.5a.5.5 0 0 1 .708 0zm6.292 0a.5.5 0 0 0 0 .708L14.293 8l-3.147 3.146a.5.5 0 0 0 .708.708l3.5-3.5a.5.5 0 0 0 0-.708l-3.5-3.5a.5.5 0 0 0-.708 0z"/>
            </svg>
            개발자
          </div>
          <ul class="section-list">
            <li class="section-item" data-section="devlog"><span class="section-icon">#</span> 개발 일지</li>
            <li class="section-item" data-section="recruit"><span class="section-icon">#</span> 팀원 모집</li>
            <li class="section-item" data-section="asset"><span class="section-icon">#</span> 에셋 공유</li>
          </ul>
        </div>

      </div>
    </aside>

    <!-- MAIN FEED -->
    <main class="main-feed" id="mainFeed">
      <div class="feed-header">
        <h2 class="feed-title" id="feedTitle">
          <span class="feed-hash">#</span> 공지사항
        </h2>
        <p class="feed-desc" id="feedDesc">관리자가 작성하는 중요 공지를 확인하세요.</p>
      </div>

      <div class="pinned-posts" id="pinnedPosts"></div>
      <div class="posts-list" id="postsList"></div>

      <div class="load-more-wrap">
        <button class="load-more-btn" id="loadMoreBtn">더 보기</button>
      </div>
    </main>

  </div>

  <!-- ===== MODAL: 로그인 ===== -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <button class="modal-close" id="closeLoginModal">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="modal-logo">
        <span class="logo-icon sm"></span>
        <span>RobloxBoard</span>
      </div>
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="login">로그인</button>
        <button class="modal-tab" data-tab="register">회원가입</button>
      </div>
      <div class="modal-form" id="formLogin">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" placeholder="비밀번호 입력" />
        </div>
        <button class="form-submit">로그인</button>
      </div>
      <div class="modal-form hidden" id="formRegister">
        <div class="form-group">
          <label>닉네임</label>
          <input type="text" placeholder="닉네임 입력" />
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" placeholder="example@email.com" />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" placeholder="8자 이상" />
        </div>
        <div class="form-group">
          <label>Roblox 유저명 <span class="optional">(선택)</span></label>
          <input type="text" placeholder="Roblox 아이디" />
        </div>
        <button class="form-submit">가입하기</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: 글쓰기 ===== -->
  <div class="modal-overlay" id="writeModal">
    <div class="modal modal-write">
      <button class="modal-close" id="closeWriteModal">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <h2 class="modal-title">새 게시물</h2>
      <div class="write-section-select">
        <label>섹션 선택</label>
        <select id="writeSectionSelect">
          <option value="notice"># 공지사항</option>
          <option value="showcase"># 게임 소개</option>
          <option value="review"># 리뷰 / 평가</option>
          <option value="general" selected># 자유 게시판</option>
          <option value="qna"># 질문 / 답변</option>
          <option value="tip"># 팁 &amp; 공략</option>
          <option value="devlog"># 개발 일지</option>
          <option value="recruit"># 팀원 모집</option>
          <option value="asset"># 에셋 공유</option>
        </select>
      </div>
      <div class="form-group">
        <label>제목</label>
        <input type="text" placeholder="게시물 제목" id="writeTitle" />
      </div>
      <div class="form-group game-id-group">
        <label>Roblox 게임 ID <span class="optional">(선택)</span></label>
        <div class="game-id-row">
          <input type="text" placeholder="게임 ID 입력 (예: 292439477)" id="gameIdInput" />
          <button class="fetch-btn" id="fetchGameBtn">불러오기</button>
        </div>
        <div class="game-preview hidden" id="gamePreview">
          <div class="game-thumb-placeholder" id="gameThumb"></div>
          <div class="game-info-preview">
            <span class="game-name-preview" id="gameNamePreview">게임 이름</span>
            <span class="game-id-preview" id="gameIdPreview">ID: —</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>내용</label>
        <div class="editor-toolbar">
          <button class="toolbar-btn" title="굵게" onclick="insertMd('**','**')"><b>B</b></button>
          <button class="toolbar-btn" title="기울임" onclick="insertMd('*','*')"><i>I</i></button>
          <button class="toolbar-btn" title="코드" onclick="insertMd('`','`')">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M10.478 1.647a.5.5 0 1 0-.956-.294l-4 13a.5.5 0 0 0 .956.294l4-13zM4.854 4.146a.5.5 0 0 1 0 .708L1.707 8l3.147 3.146a.5.5 0 0 1-.708.708l-3.5-3.5a.5.5 0 0 1 0-.708l3.5-3.5a.5.5 0 0 1 .708 0zm6.292 0a.5.5 0 0 0 0 .708L14.293 8l-3.147 3.146a.5.5 0 0 0 .708.708l3.5-3.5a.5.5 0 0 0 0-.708l-3.5-3.5a.5.5 0 0 0-.708 0z"/></svg>
          </button>
          <button class="toolbar-btn" title="링크" onclick="insertMd('[','](url)')">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M6.354 5.5H4a3 3 0 0 0 0 6h3a3 3 0 0 0 2.83-4H9c-.086 0-.17.01-.25.031A2 2 0 0 1 7 9.5H4a2 2 0 1 1 0-4h1.535c.218-.376.495-.714.82-1z"/><path d="M9 5.5a3 3 0 0 0-2.83 4h1.098A2 2 0 0 1 9 6.5h3a2 2 0 1 1 0 4h-1.535a4.02 4.02 0 0 1-.82 1H12a3 3 0 1 0 0-6H9z"/></svg>
          </button>
          <div class="toolbar-divider"></div>
          <label class="toolbar-btn img-upload-btn" title="이미지 (최대 5장)">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/><path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"/></svg>
            이미지
            <input type="file" accept="image/*" multiple style="display:none" id="imageInput" />
          </label>
          <span class="img-count" id="imgCount">0/5</span>
        </div>
        <textarea class="editor-textarea" id="editorTextarea" placeholder="내용을 입력하세요. 마크다운을 지원합니다." rows="10"></textarea>
        <div class="img-preview-row" id="imgPreviewRow"></div>
      </div>
      <div class="write-actions">
        <button class="cancel-btn" id="cancelWrite">취소</button>
        <button class="form-submit" id="submitPost">게시하기</button>
      </div>
    </div>
  </div>

  <!-- ===== MODAL: 게시물 상세 ===== -->
  <div class="modal-overlay" id="postModal">
    <div class="modal modal-post">
      <button class="modal-close" id="closePostModal">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div id="postModalContent"></div>
    </div>
  </div>

  <!-- JS (순서 중요) -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/render.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/post.js"></script>
  <script src="js/write.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
