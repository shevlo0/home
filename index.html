<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RobloxBoard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* ===================== RESET ===================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Nunito','Malgun Gothic',sans-serif;background:#f2f2f2;color:#1a1a1a;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:'Nunito','Malgun Gothic',sans-serif;font-size:13px}
ul{list-style:none}
a{text-decoration:none;color:inherit}
.hidden{display:none!important}

/* ===================== VARIABLES ===================== */
:root{
  --blue:#0066ff;--blue-light:#e8f0ff;--blue-dark:#0044cc;
  --red:#e53e3e;--green:#17a363;
  --bg:#f2f2f2;--white:#fff;--light:#f7f7f7;--hover:#ebebeb;
  --border:#d4d4d4;--border-md:#c0c0c0;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --sidebar-w:220px;--nav-h:48px;
  --r-sm:4px;--r-md:6px;--r-lg:10px;
  --sh-sm:0 1px 3px rgba(0,0,0,.08);
  --sh-md:0 2px 8px rgba(0,0,0,.12);
  --sh-lg:0 4px 20px rgba(0,0,0,.15)
}

/* ===================== NAVBAR ===================== */
.navbar{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:#fff;border-bottom:2px solid var(--blue);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:100;gap:12px
}
.navbar-left{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.navbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}

.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{
  display:inline-block;width:26px;height:26px;
  background:var(--blue);border-radius:var(--r-sm);position:relative
}
.logo-icon::before{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);width:14px;height:14px;
  background:#fff;border-radius:2px;
  clip-path:polygon(20% 0%,80% 0%,100% 20%,100% 80%,80% 100%,20% 100%,0% 80%,0% 20%)
}
.logo-icon.sm{width:22px;height:22px}
.logo-text{font-size:15px;font-weight:800;color:var(--blue);letter-spacing:-.3px;white-space:nowrap}

.search-bar{
  display:flex;align-items:center;background:var(--light);
  border:1px solid var(--border);border-radius:var(--r-md);
  padding:0 10px;gap:7px;height:30px;max-width:320px;flex:1;
  transition:border-color .15s,box-shadow .15s
}
.search-bar:focus-within{border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,102,255,.12);background:#fff}
.search-icon{color:var(--text3);display:flex}
.search-bar input{border:none;background:transparent;outline:none;width:100%;font-size:12.5px;color:var(--text)}
.search-bar input::placeholder{color:var(--text3)}

.nav-btn{
  height:28px;padding:0 10px;border-radius:var(--r-md);
  font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;
  transition:background .12s;white-space:nowrap
}
.sort-btn{background:var(--light);border:1px solid var(--border);color:var(--text2)}
.sort-btn:hover{background:var(--hover)}
.lang-btn{background:var(--light);border:1px solid var(--border);color:var(--text2);font-weight:700}
.lang-btn:hover{background:var(--hover)}
.login-btn{background:var(--light);border:1px solid var(--border);color:var(--text)}
.login-btn:hover{background:var(--hover)}
.write-btn{background:var(--blue);color:#fff;font-weight:700}
.write-btn:hover{background:var(--blue-dark)}

/* ===================== LAYOUT ===================== */
.layout{display:flex;margin-top:var(--nav-h);min-height:calc(100vh - var(--nav-h))}

/* ===================== SIDEBAR ===================== */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:#fff;
  border-right:1px solid var(--border);
  position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
.sidebar-inner{padding:8px 0 24px}
.sidebar-category{margin-bottom:4px}
.category-header{
  padding:8px 14px 4px;font-size:10.5px;font-weight:800;color:var(--text3);
  letter-spacing:.06em;text-transform:uppercase;
  display:flex;align-items:center;gap:5px;user-select:none
}
.category-header.pinned{color:var(--blue)}
.section-list{padding:0 6px}
.section-item{
  display:flex;align-items:center;gap:6px;padding:5px 10px;
  border-radius:var(--r-md);font-size:13px;font-weight:600;
  color:var(--text2);cursor:pointer;transition:background .1s,color .1s;
  position:relative;user-select:none
}
.section-item:hover{background:var(--hover);color:var(--text)}
.section-item.active{background:var(--blue-light);color:var(--blue)}
.section-icon{font-size:13px;font-weight:700;opacity:.5;font-family:'Source Code Pro',monospace}
.section-item.active .section-icon{opacity:1}
.section-pin{
  margin-left:auto;font-size:9px;font-weight:800;
  background:var(--blue);color:#fff;padding:1px 5px;border-radius:3px;letter-spacing:.04em
}

/* ===================== MAIN FEED ===================== */
.main-feed{flex:1;min-width:0;padding:24px 28px;max-width:860px}
.feed-header{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.feed-title{font-size:18px;font-weight:800;color:var(--text);display:flex;align-items:baseline;gap:4px}
.feed-hash{font-family:'Source Code Pro',monospace;font-size:16px;color:var(--blue)}
.feed-desc{font-size:12.5px;color:var(--text3);margin-top:4px}

/* ===================== POST CARDS ===================== */
.pinned-posts{margin-bottom:18px}
.post-card{
  background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);
  margin-bottom:10px;overflow:hidden;cursor:pointer;
  transition:box-shadow .15s,border-color .15s
}
.post-card:hover{border-color:var(--blue);box-shadow:var(--sh-md)}
.pinned-card{border-color:#c0d4ff;background:#f5f8ff}
.pin-label{
  background:var(--blue);color:#fff;font-size:10.5px;font-weight:700;
  padding:4px 12px;display:flex;align-items:center;gap:5px;letter-spacing:.04em
}
.post-card-inner{padding:14px 16px}
.post-meta-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.post-author{display:flex;align-items:center;gap:7px}
.avatar{
  width:26px;height:26px;border-radius:50%;background:var(--blue);
  color:#fff;font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.author-name{font-size:12.5px;font-weight:700;color:var(--text)}
.post-date{font-size:11.5px;color:var(--text3);font-family:'Source Code Pro',monospace}
.badge{
  display:inline-flex;align-items:center;font-size:10px;font-weight:800;
  padding:1px 6px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase
}
.badge-admin{background:#ffe0e0;color:#c0392b}
.badge-new{background:#e0f5e9;color:#1a7a45}
.badge-active{background:#fff3cd;color:#856404}
.badge-pro{background:var(--blue-light);color:var(--blue-dark)}
.badge-mod{background:#f0e6ff;color:#6b21a8}
.post-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:5px;line-height:1.4}
.post-preview{
  font-size:12.5px;color:var(--text2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden
}
.post-game-thumb{width:48px;height:48px;border-radius:var(--r-md);background:var(--light);border:1px solid var(--border);object-fit:cover;flex-shrink:0}
.post-with-thumb{display:flex;align-items:flex-start;gap:12px}
.post-thumb-info{flex:1;min-width:0}
.post-footer{
  display:flex;align-items:center;gap:14px;margin-top:10px;
  padding-top:10px;border-top:1px solid #f0f0f0
}
.post-stat{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);font-weight:600}
.post-stat svg{opacity:.6}
.section-tag{margin-left:auto;font-size:11px;color:var(--text3);font-family:'Source Code Pro',monospace}

/* ===================== LOAD MORE ===================== */
.load-more-wrap{text-align:center;margin-top:24px}
.load-more-btn{
  padding:8px 32px;border:1.5px solid var(--border-md);border-radius:var(--r-md);
  font-size:13px;font-weight:700;color:var(--text2);background:#fff;transition:all .12s
}
.load-more-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}

/* ===================== MODAL BASE ===================== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .18s
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh-lg);
  width:100%;max-width:420px;padding:28px 28px 24px;position:relative;
  max-height:90vh;overflow-y:auto;
  transform:translateY(12px);transition:transform .18s
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-write{max-width:640px}
.modal-post{max-width:720px}
.modal-close{
  position:absolute;top:14px;right:14px;width:28px;height:28px;
  border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;
  color:var(--text3);transition:background .12s,color .12s
}
.modal-close:hover{background:var(--hover);color:var(--text)}
.modal-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--blue);margin-bottom:20px}
.modal-title{font-size:16px;font-weight:800;margin-bottom:18px;color:var(--text)}
.modal-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px}
.modal-tab{
  padding:6px 16px;font-size:13px;font-weight:700;color:var(--text3);
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .12s,border-color .12s
}
.modal-tab.active{color:var(--blue);border-color:var(--blue)}
.modal-tab:hover:not(.active){color:var(--text)}

/* ===================== FORMS ===================== */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;letter-spacing:.03em}
.optional{font-weight:400;color:var(--text3)}
.form-group input,.form-group select{
  width:100%;height:34px;padding:0 10px;border:1.5px solid var(--border);
  border-radius:var(--r-md);background:var(--light);color:var(--text);
  font-size:13px;outline:none;transition:border-color .12s,box-shadow .12s,background .12s
}
.form-group input:focus,.form-group select:focus{
  border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,102,255,.12);background:#fff
}
.form-submit{
  width:100%;height:38px;background:var(--blue);color:#fff;border-radius:var(--r-md);
  font-size:13.5px;font-weight:800;margin-top:4px;transition:background .12s
}
.form-submit:hover{background:var(--blue-dark)}
.write-section-select{margin-bottom:14px}
.write-section-select label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px}

/* ===================== GAME ID ===================== */
.game-id-row{display:flex;gap:8px}
.game-id-row input{flex:1}
.fetch-btn{
  height:34px;padding:0 14px;background:var(--light);border:1.5px solid var(--border);
  border-radius:var(--r-md);font-size:12.5px;font-weight:700;color:var(--blue);
  white-space:nowrap;transition:all .12s
}
.fetch-btn:hover{background:var(--blue-light);border-color:var(--blue)}
.game-preview{
  margin-top:10px;display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--light);border:1px solid var(--border);border-radius:var(--r-md)
}
.game-thumb-placeholder{width:56px;height:56px;border-radius:var(--r-md);background:var(--border);overflow:hidden;flex-shrink:0}
.game-thumb-placeholder img{width:100%;height:100%;object-fit:cover}
.game-info-preview{display:flex;flex-direction:column;gap:3px}
.game-name-preview{font-size:13px;font-weight:700}
.game-id-preview{font-size:11px;color:var(--text3);font-family:'Source Code Pro',monospace}

/* ===================== EDITOR ===================== */
.editor-toolbar{
  display:flex;align-items:center;gap:2px;padding:4px 8px;
  background:var(--light);border:1.5px solid var(--border);
  border-bottom:none;border-radius:var(--r-md) var(--r-md) 0 0
}
.toolbar-btn{
  width:28px;height:26px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-sm);font-size:12px;font-weight:700;color:var(--text2);
  transition:background .1s,color .1s
}
.toolbar-btn:hover{background:var(--hover);color:var(--text)}
.img-upload-btn{display:flex;align-items:center;gap:4px;cursor:pointer;padding:0 8px;width:auto;font-size:11.5px;font-weight:700}
.toolbar-divider{width:1px;height:16px;background:var(--border);margin:0 4px}
.img-count{margin-left:auto;font-size:11px;font-weight:700;color:var(--text3);font-family:'Source Code Pro',monospace}
.editor-textarea{
  width:100%;border:1.5px solid var(--border);
  border-radius:0 0 var(--r-md) var(--r-md);padding:10px 12px;
  font-size:13px;font-family:'Source Code Pro',monospace;color:var(--text);
  background:#fff;resize:vertical;outline:none;line-height:1.7;min-height:180px;
  transition:border-color .12s
}
.editor-textarea:focus{border-color:var(--blue)}
.img-preview-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.img-preview-item{position:relative;width:72px;height:72px;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border)}
.img-preview-item img{width:100%;height:100%;object-fit:cover}
.img-preview-item .remove-img{
  position:absolute;top:3px;right:3px;width:18px;height:18px;
  background:rgba(0,0,0,.55);color:#fff;border-radius:50%;
  font-size:10px;display:flex;align-items:center;justify-content:center
}
.write-actions{display:flex;gap:8px;margin-top:18px}
.cancel-btn{
  height:38px;padding:0 18px;border:1.5px solid var(--border);border-radius:var(--r-md);
  font-size:13px;font-weight:700;color:var(--text2);background:var(--light);transition:all .12s
}
.cancel-btn:hover{border-color:var(--border-md);background:var(--hover)}
.write-actions .form-submit{flex:1;margin-top:0}

/* ===================== POST DETAIL ===================== */
.post-detail-title{font-size:20px;font-weight:800;line-height:1.35;margin-bottom:10px}
.post-detail-meta{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--text3);flex-wrap:wrap}
.post-detail-body{
  font-size:13.5px;line-height:1.8;color:var(--text);
  border-top:1px solid var(--border);padding-top:16px;margin:16px 0 20px;
  white-space:pre-wrap;word-break:break-word
}
.post-actions-row{
  display:flex;align-items:center;gap:10px;padding:12px 0;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:20px
}
.like-btn{
  display:flex;align-items:center;gap:5px;padding:6px 14px;
  border:1.5px solid var(--border);border-radius:var(--r-md);
  font-size:12.5px;font-weight:700;color:var(--text2);background:var(--light);transition:all .12s
}
.like-btn:hover,.like-btn.liked{border-color:#e53e3e;color:#e53e3e;background:#fff5f5}
.report-btn{
  margin-left:auto;font-size:11.5px;color:var(--text3);
  padding:5px 10px;border:1px solid transparent;border-radius:var(--r-sm);transition:all .12s
}
.report-btn:hover{color:var(--red);border-color:var(--red);background:#fff5f5}
.comments-section-title{font-size:13px;font-weight:800;color:var(--text2);margin-bottom:12px}
.comment-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f3f3f3}
.comment-item:last-child{border-bottom:none}
.comment-body{flex:1}
.comment-author{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.comment-text{font-size:13px;color:var(--text2);line-height:1.6}
.comment-date{font-size:11px;color:var(--text3);font-family:'Source Code Pro',monospace}
.comment-input-row{display:flex;gap:8px;margin-top:14px}
.comment-input-row input{
  flex:1;height:36px;padding:0 12px;border:1.5px solid var(--border);
  border-radius:var(--r-md);background:var(--light);font-size:13px;
  color:var(--text);outline:none;transition:border-color .12s
}
.comment-input-row input:focus{border-color:var(--blue);background:#fff}
.comment-submit{
  height:36px;padding:0 16px;background:var(--blue);color:#fff;
  border-radius:var(--r-md);font-size:12.5px;font-weight:700;
  white-space:nowrap;transition:background .12s
}
.comment-submit:hover{background:var(--blue-dark)}

/* ===================== AVATAR COLORS ===================== */
.av-0{background:#0066ff}.av-1{background:#e53e3e}.av-2{background:#17a363}
.av-3{background:#e06b1a}.av-4{background:#7c3aed}.av-5{background:#0891b2}
.av-6{background:#be185d}.av-7{background:#a16207}

/* ===================== RESPONSIVE ===================== */
@media(max-width:768px){
  .sidebar{display:none}
  .main-feed{padding:16px}
  .modal-write{max-width:100%}
  .navbar-left .search-bar{max-width:160px}
  .logo-text{display:none}
}
</style>
</head>
<body>

<!-- ========== NAVBAR ========== -->
<header class="navbar">
  <div class="navbar-left">
    <div class="logo">
      <span class="logo-icon"></span>
      <span class="logo-text">RobloxBoard</span>
    </div>
    <div class="search-bar">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </span>
      <input type="text" placeholder="게임, 게시물 검색..." id="searchInput"/>
    </div>
  </div>
  <div class="navbar-right">
    <button class="nav-btn sort-btn" id="sortBtn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M4 8h8M6 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span id="sortLabel">최신순</span>
    </button>
    <button class="nav-btn lang-btn" id="langBtn">KO</button>
    <button class="nav-btn login-btn" id="loginBtn">로그인</button>
    <button class="nav-btn write-btn" id="writeBtn">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      글쓰기
    </button>
  </div>
</header>

<!-- ========== LAYOUT ========== -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-inner">

      <div class="sidebar-category">
        <div class="category-header pinned">
          <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a5.927 5.927 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707-.195-.195.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a5.922 5.922 0 0 1 1.013.16l3.134-3.133a2.772 2.772 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146z"/></svg>
          공지
        </div>
        <ul class="section-list">
          <li class="section-item active" data-section="notice"><span class="section-icon">#</span> 공지사항<span class="section-pin">PIN</span></li>
          <li class="section-item" data-section="update"><span class="section-icon">#</span> 업데이트</li>
        </ul>
      </div>

      <div class="sidebar-category">
        <div class="category-header">
          <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M6 1H1v5l9.5 9.5a1 1 0 0 0 1.5 0l3-3a1 1 0 0 0 0-1.5L6 1zm-1.5 3a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/></svg>
          게임 공유
        </div>
        <ul class="section-list">
          <li class="section-item" data-section="showcase"><span class="section-icon">#</span> 게임 소개</li>
          <li class="section-item" data-section="review"><span class="section-icon">#</span> 리뷰 / 평가</li>
          <li class="section-item" data-section="recommend"><span class="section-icon">#</span> 추천 요청</li>
        </ul>
      </div>

        <div class="category-header">

const BADGE_MAP = {
  admin:  { label:'관리자', cls:'badge-admin' },
  mod:    { label:'모더레이터', cls:'badge-mod' },

let POSTS = [
  { id:1, section:'notice', title:'RobloxBoard 서비스 오픈 안내',
    content:'RobloxBoard가 정식 오픈했습니다. 로블록스 게임을 공유하고 커뮤니티와 소통해보세요.\n\n이 플랫폼에서는 게임 소개, 리뷰, 개발 일지, 팁 등 다양한 콘텐츠를 공유할 수 있습니다.',
    author:{name:'Admin',role:'admin'}, likes:24, comments:2, date:'2025.04.28', pinned:true },
  { id:2, section:'showcase', title:'제가 6개월 동안 만든 타워 디펜스 게임 소개합니다',
    content:'안녕하세요! 혼자서 6개월간 만든 타워 디펜스 게임을 소개합니다.\n\n총 20개 스테이지, 15종 타워, 유니크한 보스몬스터가 있습니다. 많이 플레이해주세요!',
    author:{name:'TowerKing',role:'active'}, likes:87, comments:3, date:'2025.04.27', pinned:false,
    gameId:'292439477', gameThumb:'https://tr.rbxcdn.com/53eb9b17fe1432a809c73a13889b5006/768/432/Image/Png', gameName:'Tower Defense Simulator' },
  { id:3, section:'qna', title:'로블록스 스튜디오에서 파트 레이캐스트 사용법 알려주세요',
    content:'레이캐스트를 이용해 총알 판정을 구현하려고 하는데, 예제 코드나 튜토리얼 링크 알고 계신 분 있나요?',
    author:{name:'NewDev99',role:'new'}, likes:5, comments:12, date:'2025.04.27', pinned:false },
  { id:4, section:'tip', title:'렉 없는 서버 스크립트 최적화 팁 모음 (실전)',
    content:'1. 반복 루프 안에서 wait() 대신 task.wait() 사용하기\n2. RemoteEvent 남용 금지\n3. 인스턴스 생성은 최소화\n4. CollectionService로 태그 관리',
    author:{name:'ScriptPro',role:'pro'}, likes:142, comments:31, date:'2025.04.26', pinned:false },
  { id:5, section:'general', title:'요즘 로블록스 트렌드가 레이싱 게임인가요?',
    content:'최근 인기 목록 보면 레이싱 게임이 많이 보이더라고요. 다들 어떤 장르 즐기시나요?',
    author:{name:'RblxFan',role:'new'}, likes:18, comments:44, date:'2025.04.25', pinned:false },
  { id:6, section:'devlog', title:'[개발일지 #7] 보스 AI 패턴 구현 완료!',
    content:'드디어 보스 AI 3가지 패턴을 모두 구현했습니다.\n\n- 패턴 1: 레이저 회전 공격\n- 패턴 2: 범위 폭발\n- 패턴 3: 소환 몬스터',
    author:{name:'DevLogger',role:'active'}, likes:63, comments:17, date:'2025.04.24', pinned:false },
  { id:7, section:'recruit', title:'2인 팀 스크립터 구합니다 (모바일 RPG 개발 중)',
    content:'현재 맵 디자이너 1명, 기획 1명이 있고 스크립터 1명을 추가로 모집합니다.\n\n요구 스펙: Lua 기초 이상, Discord 소통 가능, 주 10시간 이상 투자 가능',
    author:{name:'RPGBuilder',role:'active'}, likes:9, comments:6, date:'2025.04.23', pinned:false },
];

let COMMENTS = {
  1:[
    {author:'CoolPlayer',role:'new',text:'오픈 축하드립니다! 좋은 플랫폼이 될 것 같아요.',date:'2025.04.28'},
    {author:'Admin',role:'admin',text:'감사합니다! 앞으로 더 좋은 서비스로 발전하겠습니다.',date:'2025.04.28'},
  ],
  2:[
    {author:'GameFan',role:'active',text:'진짜 완성도 높네요. 플레이 해봤는데 재밌어요!',date:'2025.04.27'},
    {author:'NewDev99',role:'new',text:'6개월 혼자 만드셨다고요? 대단하시네요.',date:'2025.04.27'},
    {author:'ScriptPro',role:'pro',text:'코드 최적화 잘 되어 있나요? 렉은 없던데요.',date:'2025.04.27'},
  ],
};

/* ============================================================
   STATE
   ============================================================ */
const state = {
  section: 'notice',
  sort: 'latest',
  lang: 'ko',
  loggedIn: false,
  user: null,
  imgFiles: [],
};

/* ============================================================
   UTILS
   ============================================================ */
const $ = id => document.getElementById(id);
const $$ = sel => document.querySelectorAll(sel);

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function avColor(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % 8;
  return 'av-' + h;
}

function badge(role) {
  const b = BADGE_MAP[role];
  return b ? `<span class="badge ${b.cls}">${b.label}</span>` : '';
}

function openModal(id)  { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

/* ============================================================
   RENDER FEED
   ============================================================ */
function renderFeed() {
  const sec = state.section;
  const info = SECTIONS[sec] || {label:sec, desc:''};
  $('feedTitle').innerHTML = `<span class="feed-hash">#</span> ${info.label}`;
  $('feedDesc').textContent = info.desc;

  // Pinned
  const pinned = POSTS.filter(p => p.section === sec && p.pinned);
  $('pinnedPosts').innerHTML = pinned.map(p => `
    <div class="post-card pinned-card" data-id="${p.id}">
      <div class="pin-label">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a5.927 5.927 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707-.195-.195.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a5.922 5.922 0 0 1 1.013.16l3.134-3.133a2.772 2.772 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146z"/></svg>
        고정된 게시물
      </div>
      ${cardInner(p)}
    </div>`).join('');

  // Normal posts
  let posts = POSTS.filter(p => p.section === sec && !p.pinned);
  if (state.sort === 'popular') posts = [...posts].sort((a,b) => b.likes - a.likes);
  else posts = [...posts].sort((a,b) => b.id - a.id);

  $('postsList').innerHTML = posts.length
    ? posts.map(p => `<div class="post-card" data-id="${p.id}">${cardInner(p)}</div>`).join('')
    : `<div style="text-align:center;padding:48px 0;color:var(--text3);font-size:13px;">아직 게시물이 없어요. 첫 번째 글을 작성해보세요!</div>`;

  // Click handlers
  $$('.post-card[data-id]').forEach(el => {
    el.addEventListener('click', () => openPost(+el.dataset.id));
  });
}

function cardInner(p) {
  const av = avColor(p.author.name);
  const init = p.author.name.charAt(0).toUpperCase();
  const body = p.gameThumb
    ? `<div class="post-with-thumb">
        <img class="post-game-thumb" src="${esc(p.gameThumb)}" alt="" onerror="this.style.display='none'">
        <div class="post-thumb-info">
          <h3 class="post-title">${esc(p.title)}</h3>
          <p class="post-preview">${esc(p.content.slice(0,120))}...</p>
        </div>
       </div>`
    : `<h3 class="post-title">${esc(p.title)}</h3>
       <p class="post-preview">${esc(p.content.slice(0,160))}...</p>`;

  return `<div class="post-card-inner">
    <div class="post-meta-top">
      <div class="post-author">
        <div class="avatar ${av}">${init}</div>
        <span class="author-name">${esc(p.author.name)}</span>
        ${badge(p.author.role)}
      </div>
      <span class="post-date">${p.date}</span>
    </div>
    ${body}
    <div class="post-footer">
      <span class="post-stat">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2.748-.717.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 3.485L8 2.748z" stroke="currentColor" stroke-width="1.2"/></svg>
        ${p.likes}
      </span>
      <span class="post-stat">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M14 1a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1h-2.5a2 2 0 0 0-1.6.8L8 14.333 6.1 11.8a2 2 0 0 0-1.6-.8H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h12z" stroke="currentColor" stroke-width="1.2"/></svg>
        ${p.comments}
      </span>
      <span class="section-tag"># ${SECTIONS[p.section]?.label || p.section}</span>
    </div>
  </div>`;
}

/* ============================================================
   POST DETAIL MODAL
   ============================================================ */
function openPost(id) {
  const p = POSTS.find(x => x.id === id);
  if (!p) return;
  const av = avColor(p.author.name);
  const init = p.author.name.charAt(0).toUpperCase();
  const coms = COMMENTS[id] || [];

  const thumbHtml = p.gameThumb ? `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--light);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:14px;">
      <img src="${esc(p.gameThumb)}" style="width:52px;height:52px;border-radius:6px;object-fit:cover;" onerror="this.style.display='none'">
      <div>
        <div style="font-size:13px;font-weight:700;">${esc(p.gameName||'')}</div>
        <div style="font-size:11px;color:var(--text3);font-family:'Source Code Pro',monospace;">ID: ${esc(p.gameId)}</div>
      </div>
    </div>` : '';

  const comsHtml = coms.map(c => {
    const ca = avColor(c.author);
    const ci = c.author.charAt(0).toUpperCase();
    return `<div class="comment-item">
      <div class="avatar ${ca}" style="width:28px;height:28px;font-size:11px;flex-shrink:0;">${ci}</div>
      <div class="comment-body">
        <div class="comment-author">${esc(c.author)} ${badge(c.role)} <span class="comment-date">${c.date}</span></div>
        <div class="comment-text">${esc(c.text)}</div>
      </div>
    </div>`;
  }).join('');

  $('postModalContent').innerHTML = `
    <div style="margin-bottom:18px;">
      <h2 class="post-detail-title">${esc(p.title)}</h2>
      <div class="post-detail-meta">
        <div class="avatar ${av}" style="width:22px;height:22px;font-size:10px;">${init}</div>
        <strong>${esc(p.author.name)}</strong>
        ${badge(p.author.role)}
        <span>${p.date}</span>
        <span style="font-family:'Source Code Pro',monospace;font-size:11px;"># ${SECTIONS[p.section]?.label||p.section}</span>
      </div>
    </div>
    ${thumbHtml}
    <div class="post-detail-body">${esc(p.content)}</div>
    <div class="post-actions-row">
      <button class="like-btn" id="likeBtn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2.748-.717.737C5.6.281 2.514.878 1.4 3.053c-.523 1.023-.641 2.5.314 4.385.92 1.815 2.834 3.989 6.286 6.357 3.452-2.368 5.365-4.542 6.286-6.357.955-1.886.838-3.362.314-4.385C13.486.878 10.4.28 8.717 3.485L8 2.748z" stroke="currentColor" stroke-width="1.3"/></svg>
        좋아요 <span id="likeCount">${p.likes}</span>
      </button>
      <button class="report-btn">신고</button>
    </div>
    <div>
      <div class="comments-section-title">댓글 ${coms.length}개</div>
      <div id="commentsBox">${comsHtml}</div>
      <div class="comment-input-row">
        <input type="text" id="commentInput" placeholder="${state.loggedIn ? '댓글을 입력하세요...' : '로그인 후 댓글을 달 수 있습니다.'}" ${state.loggedIn ? '' : 'disabled'}/>
        <button class="comment-submit" id="commentSubmit">등록</button>
      </div>
    </div>`;

  openModal('postModal');

  $('likeBtn').addEventListener('click', () => {
    p.likes++;
    $('likeCount').textContent = p.likes;
    $('likeBtn').classList.add('liked');
    renderFeed();
  });

  $('commentSubmit').addEventListener('click', () => {
    if (!state.loggedIn) { closeModal('postModal'); openModal('loginModal'); return; }
    const inp = $('commentInput');
    const txt = inp.value.trim();
    if (!txt) return;
    if (!COMMENTS[id]) COMMENTS[id] = [];
    COMMENTS[id].push({ author:state.user.name, role:'new', text:txt, date:todayStr() });
    p.comments++;
    inp.value = '';
    openPost(id);
  });
}

/* ============================================================
   AUTH
   ============================================================ */
function updateAuthUI() {
  const btn = $('loginBtn');
  if (state.loggedIn) {
    const av = avColor(state.user.name);
    btn.innerHTML = `<div class="avatar ${av}" style="width:20px;height:20px;font-size:10px;margin-right:4px;">${state.user.name.charAt(0).toUpperCase()}</div>${esc(state.user.name)}`;
  } else {
    btn.textContent = '로그인';
  }
}

$('loginBtn').addEventListener('click', () => {
  if (state.loggedIn) { state.loggedIn = false; state.user = null; updateAuthUI(); }
  else openModal('loginModal');
});

$('closeLoginModal').addEventListener('click', () => closeModal('loginModal'));
$('loginModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('loginModal'); });

$$('.modal-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    $$('.modal-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    $('formLogin').classList.toggle('hidden', tab.dataset.tab !== 'login');
    $('formRegister').classList.toggle('hidden', tab.dataset.tab !== 'register');
  });
});

$('doLogin').addEventListener('click', () => {
  const email = $('loginEmail').value.trim();
  if (!email) { alert('이메일을 입력해주세요.'); return; }
  state.loggedIn = true;
  state.user = { name: email.split('@')[0], role:'new' };
  closeModal('loginModal');
  updateAuthUI();
});

$('doRegister').addEventListener('click', () => {
  const nick = $('regNick').value.trim();
  const email = $('regEmail').value.trim();
  if (!nick || !email) { alert('닉네임과 이메일을 입력해주세요.'); return; }
  state.loggedIn = true;
  state.user = { name: nick, role:'new' };
  closeModal('loginModal');
  updateAuthUI();
});

/* ============================================================
   WRITE
   ============================================================ */
$('writeBtn').addEventListener('click', () => {
  if (!state.loggedIn) { openModal('loginModal'); return; }
  openModal('writeModal');
});
$('closeWriteModal').addEventListener('click', () => closeModal('writeModal'));
$('cancelWrite').addEventListener('click', () => closeModal('writeModal'));
$('writeModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('writeModal'); });

$('imageInput').addEventListener('change', e => {
  const files = Array.from(e.target.files);
  const rem = 5 - state.imgFiles.length;
  state.imgFiles = [...state.imgFiles, ...files.slice(0, rem)];
  renderImgPreviews();
  e.target.value = '';
});

function renderImgPreviews() {
  $('imgCount').textContent = `${state.imgFiles.length}/5`;
  $('imgPreviewRow').innerHTML = state.imgFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="img-preview-item">
      <img src="${url}">
      <button class="remove-img" data-i="${i}" style="cursor:pointer;">x</button>
    </div>`;
  }).join('');
  $$('.remove-img').forEach(btn => btn.addEventListener('click', () => {
    state.imgFiles.splice(+btn.dataset.i, 1);
    renderImgPreviews();
  }));
}

$('fetchGameBtn').addEventListener('click', () => {
  const gid = $('gameIdInput').value.trim();
  if (!gid) return;
  $('gamePreview').classList.remove('hidden');
  $('gameThumb').innerHTML = `<img src="https://tr.rbxcdn.com/53eb9b17fe1432a809c73a13889b5006/768/432/Image/Png" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.style.background='#ddd'">`;
  $('gameNamePreview').textContent = `Game ID: ${gid}`;
  $('gameIdPreview').textContent = `ID: ${gid}`;
});

$('submitPost').addEventListener('click', () => {
  const title = $('writeTitle').value.trim();
  const content = $('editorTextarea').value.trim();
  const section = $('writeSectionSelect').value;
  if (!title) { alert('제목을 입력해주세요.'); return; }
  if (!content) { alert('내용을 입력해주세요.'); return; }
  const gameId = $('gameIdInput').value.trim();
  POSTS.unshift({
    id: Date.now(), section, title, content,
    author: state.user,
    likes:0, comments:0, date:todayStr(), pinned:false,
    gameId: gameId || null,
  });
  state.imgFiles = [];
  renderImgPreviews();
  $('writeTitle').value = '';
  $('editorTextarea').value = '';
  $('gameIdInput').value = '';
  $('gamePreview').classList.add('hidden');
  closeModal('writeModal');
  state.section = section;
  $$('.section-item').forEach(i => i.classList.toggle('active', i.dataset.section === section));
  renderFeed();
});

/* ============================================================
   POST MODAL CLOSE
   ============================================================ */
$('closePostModal').addEventListener('click', () => closeModal('postModal'));
$('postModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('postModal'); });

/* ============================================================
   SIDEBAR
   ============================================================ */
$$('.section-item').forEach(item => {
  item.addEventListener('click', () => {
    $$('.section-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    state.section = item.dataset.section;
    renderFeed();
    window.scrollTo({top:0, behavior:'smooth'});
  });
});

/* ============================================================
   NAVBAR
   ============================================================ */
$('sortBtn').addEventListener('click', () => {
  state.sort = state.sort === 'latest' ? 'popular' : 'latest';
  $('sortLabel').textContent = state.sort === 'latest' ? '최신순' : '인기순';
  renderFeed();
});

$('langBtn').addEventListener('click', () => {
  state.lang = state.lang === 'ko' ? 'en' : 'ko';
  $('langBtn').textContent = state.lang.toUpperCase();
});

let searchTimer;
$('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { renderFeed(); return; }
    const res = POSTS.filter(p =>
      p.title.toLowerCase().includes(q) ||
      p.content.toLowerCase().includes(q) ||
      p.author.name.toLowerCase().includes(q)
    );
    $('feedTitle').innerHTML = `<span class="feed-hash">#</span> 검색: ${esc(q)}`;
    $('feedDesc').textContent = `${res.length}개의 결과`;
    $('pinnedPosts').innerHTML = '';
    $('postsList').innerHTML = res.length
      ? res.map(p => `<div class="post-card" data-id="${p.id}">${cardInner(p)}</div>`).join('')
      : `<div style="text-align:center;padding:48px 0;color:var(--text3);font-size:13px;">검색 결과가 없어요.</div>`;
    $$('.post-card[data-id]').forEach(el => el.addEventListener('click', () => openPost(+el.dataset.id)));
  }, 280);
});

$('loadMoreBtn').addEventListener('click', function() {
  this.textContent = '불러오는 중...';
  setTimeout(() => { this.textContent = '더 보기'; }, 1200);
});

/* ============================================================
   EDITOR HELPER (global — called from onclick in HTML)
   ============================================================ */
function insertMd(before, after) {
  const ta = $('editorTextarea');
  const s = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e) || 'text';
  ta.value = ta.value.substring(0,s) + before + sel + after + ta.value.substring(e);
  ta.focus();
  ta.selectionStart = s + before.length;
  ta.selectionEnd   = s + before.length + sel.length;
}

/* ============================================================
   INIT
   ============================================================ */
renderFeed();
</script>
</body>
</html>
